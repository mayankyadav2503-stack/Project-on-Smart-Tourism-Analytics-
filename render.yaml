# Render Blueprint — https://render.com/docs/blueprint-spec
services:
  - type: web
    name: stap
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: python startup.py
    envVars:
      - key: FLASK_DEBUG
        value: "0"
      - key: STREAMLIT_SERVER_MAX_UPLOAD_SIZE
        value: "5"
